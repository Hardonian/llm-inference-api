name = "ai-lab-audit-api"
main = "src/worker.js"
compatibility_date = "2024-06-01"

[vars]
ENVIRONMENT = "production"
APP_NAME = "ai-lab-audit-api"
SCAN_CRON = "0 3 * * *"
LOG_LEVEL = "INFO"

[[d1_databases]]
binding = "DB"
database_name = "ai_lab_audit"
database_id = "placeholder-id"

[triggers]
crons = ["0 3 * * *"]

[[routes]]
pattern = "audit.example.com"
custom_domain = true